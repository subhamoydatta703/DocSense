# Required Environment Variables in root .env file:
# - DATABASE_URL (e.g., postgresql://postgres:postgres@db:5432/docsense?schema=public)
# - WORKER_DATABASE_URL (e.g., postgresql://postgres:postgres@db:5432/docsense?schema=public)
# - REDIS_URL (e.g., redis://redis:6379)
# - BULLMQ_REDIS_URL (e.g., redis://redis:6379)
# - CLERK_PUBLISHABLE_KEY (Backend Auth)
# - CLERK_SECRET_KEY (Backend Auth)
# - AWS_REGION (AWS S3)
# - AWS_ACCESS_KEY_ID (AWS S3)
# - AWS_SECRET_ACCESS_KEY (AWS S3)
# - AWS_S3_BUCKET_NAME (AWS S3)
# - GEMINI_API_KEY (AI Config)
# - GEMINI_EMBEDDING_API_KEY (AI Config)
# - VITE_CLERK_PUBLISHABLE_KEY (Frontend Auth)

services:
  # Database with pgvector extension support
  db:
    image: pgvector/pgvector:pg16
    container_name: docsense-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docsense
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docsense"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Caching and BullMQ Queues
  redis:
    image: redis:7-alpine
    container_name: docsense-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Bun Backend API Service (includes BullMQ Worker)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docsense-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  # Frontend SPA Service (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: docsense-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
