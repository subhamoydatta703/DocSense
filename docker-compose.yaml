services:
  # Database with pgvector extension support
  db:
    image: pgvector/pgvector:pg16
    container_name: docsense-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docsense
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docsense"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Caching and BullMQ Queues
  redis:
    image: redis:7-alpine
    container_name: docsense-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Node/Bun Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docsense-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/docsense?schema=public
      - REDIS_URL=redis://redis:6379
      - BULLMQ_REDIS_URL=redis://redis:6379
      - NODE_ENV=development # Change to production for live deploys
      
      # AWS S3 Storage Config (To be updated by user)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock-key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock-secret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-docsense-bucket}

      # AI/LLM Config (To be updated by user)
      - GEMINI_EMBEDDING_API_KEY=${GEMINI_EMBEDDING_API_KEY}

      # Authentication Config (To be updated by user)
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
